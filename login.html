<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Inventario</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .login-logo p {
            color: #64748b;
        }
        .login-form .form-group {
            margin-bottom: 20px;
        }
        .login-form input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .login-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .login-info {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.9rem;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
        }
        .login-info strong {
            color: #1e293b;
        }
        .auto-init-badge {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1>🍞</h1>
                <h2>Sistema de Inventario</h2>
                <p>Inicie sesión para continuar</p>
            </div>
            
            <div id="login-error" class="login-error">
                ❌ Código o contraseña incorrectos
            </div>
            
            <form class="login-form" onsubmit="iniciarSesion(event)" autocomplete="off">
                <div class="form-group">
                    <input type="text" id="login-codigo" name="codigo-usuario-xyz" placeholder="Código de cajero" 
                           required autofocus autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" name="password-usuario-xyz" placeholder="Contraseña" 
                           required autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                </div>
                <button type="submit" class="login-btn">🔐 Iniciar Sesión</button>
            </form>
            
            <div class="login-info">

            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 🎯 INICIALIZACIÓN AUTOMÁTICA PARA GITHUB PAGES
        // Se ejecuta SIEMPRE al cargar la página para garantizar que el admin exista
        
        function inicializarSistemaCompleto() {
            console.log('🔧 Inicializando sistema para GitHub Pages...');
            
            // 1. FORZAR inicialización de datos base
            const CATEGORIAS_DEFAULT = [
                { id: 'sa', nombre: 'Categoría SA', icono: '🌭', descripcion: 'Completería', protegida: false },
                { id: 'panaderia', nombre: 'Panadería', icono: '🥖', descripcion: 'Productos de panadería', protegida: false }
            ];
            
            const DATOS_DEFAULT = {
                sa: [
                    { id: 'sa-1', nombre: 'Pan de Completo', cantidad: 50, unidad: 'unidades', minimo: 20 },
                    { id: 'sa-2', nombre: 'Vienesas', cantidad: 100, unidad: 'unidades', minimo: 30 },
                    { id: 'sa-3', nombre: 'Tomate', cantidad: 5, unidad: 'kg', minimo: 2 },
                    { id: 'sa-4', nombre: 'Palta', cantidad: 10, unidad: 'unidades', minimo: 5 },
                    { id: 'sa-5', nombre: 'Mayonesa', cantidad: 3, unidad: 'litros', minimo: 1 }
                ],
                panaderia: [
                    { id: 'pan-1', nombre: 'Muffin', cantidad: 24, unidad: 'unidades', minimo: 12 },
                    { id: 'pan-2', nombre: 'Marraqueta', cantidad: 30, unidad: 'unidades', minimo: 15 },
                    { id: 'pan-3', nombre: 'Hallullas', cantidad: 40, unidad: 'unidades', minimo: 20 },
                    { id: 'pan-4', nombre: 'Dobladitas', cantidad: 25, unidad: 'unidades', minimo: 10 },
                    { id: 'pan-5', nombre: 'Ciabatta', cantidad: 15, unidad: 'unidades', minimo: 8 }
                ],
                cajeros: [
                    { 
                        id: 'admin-1', 
                        nombre: 'Administrador', 
                        rut: '0.000.000-0', 
                        turno: 'ADMIN', 
                        codigo: 'ADMIN', 
                        password: '63717',  // ← Tu contraseña
                        cargo: 'Corporativo',
                        activo: true 
                    }
                ],
                auditoria: [],
                sesion: null
            };
            
            // Guardar categorías
            localStorage.setItem('inventario_categorias', JSON.stringify(CATEGORIAS_DEFAULT));
            
            // Guardar datos de cada categoría
            CATEGORIAS_DEFAULT.forEach(cat => {
                const key = `inventario_${cat.id}`;
                if (DATOS_DEFAULT[cat.id]) {
                    localStorage.setItem(key, JSON.stringify(DATOS_DEFAULT[cat.id]));
                }
            });
            
            // 🎯 SIEMPRE recrear el admin (sobreescribir si existe)
            localStorage.setItem('inventario_cajeros', JSON.stringify(DATOS_DEFAULT.cajeros));
            
            // Inicializar auditoría vacía
            localStorage.setItem('inventario_auditoria', JSON.stringify([]));
            
            console.log('✅ Sistema inicializado. Admin: ADMIN / 63717');
        }
        
        // Ejecutar inmediatamente
        inicializarSistemaCompleto();
        
        // También ejecutar cuando el DOM esté listo (por si acaso)
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar que todo esté correcto
            const cajeros = localStorage.getItem('inventario_cajeros');
            if (!cajeros) {
                console.log('⚠️ Re-inicializando por seguridad...');
                inicializarSistemaCompleto();
            }
            
            // Limpiar campos por seguridad - evitar autocompletado
            const codigoInput = document.getElementById('login-codigo');
            const passwordInput = document.getElementById('login-password');
            
            if (codigoInput) codigoInput.value = '';
            if (passwordInput) passwordInput.value = '';
            
            // Si hay sesión activa válida, redirigir
            const sesion = localStorage.getItem('inventario_sesion');
            if (sesion) {
                try {
                    const datos = JSON.parse(sesion);
                    const ahora = new Date().getTime();

                    if (ahora - datos.inicio < expiracion) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('inventario_sesion');
                    }
                } catch(e) {
                    localStorage.removeItem('inventario_sesion');
                }
            }
        });
    </script>
</body>
</html>
